<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f7ede0">
<title>The Program</title>
<style>
:root {
  --bg: #f7ede0;
  --bg-alt: #ede2d0;
  --bg-info: #ede2d0;
  --text: #2a1d14;
  --text-2: #6b5644;
  --text-3: #9c8773;
  --text-info: #2a1d14;
  --text-success: #4a5d3f;
  --border: #d8c8b3;
  --border-light: #e8dec9;
  --oxblood: #8a3d36;
  --oxblood-bg: #762f2a;
  --oxblood-text: #fbeee9;
  --cobalt: #2c4f7c;
  --cobalt-bg: #25446b;
  --cobalt-text: #ecf0f7;
  --forest: #4a5d3f;
  --forest-bg: #3d4f33;
  --forest-text: #eef1e6;
  --brass: #a07a3a;
  --brass-bright: #b88e47;
  --serif: 'Iowan Old Style', 'Georgia', 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  font-size: 15px;
  line-height: 1.5;
  padding: env(safe-area-inset-top, 0) 1.25rem env(safe-area-inset-bottom, 0);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
}
.app { padding: 1rem 0 3rem; }
.editorial-h { font-family: var(--serif); font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; }
.eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); font-weight: 500; margin: 0; }
.divider { height: 0.5px; background: var(--border-light); margin: 1.25rem 0; border: none; }
.divider-thick { height: 0.5px; background: var(--border); margin: 1.5rem 0; border: none; }
.muted { color: var(--text-2); font-size: 13px; }
button { font-family: var(--sans); cursor: pointer; }
.btn-primary { display: block; width: 100%; padding: 16px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; }
.btn-primary:active { transform: scale(0.98); }
.btn-ghost { display: block; width: 100%; padding: 12px; background: transparent; color: var(--text); border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; margin-top: 8px; }
.btn-tiny { background: transparent; border: 0.5px solid var(--border-light); padding: 6px 10px; border-radius: var(--radius); font-size: 12px; color: var(--text-2); }
.btn-link { background: none; border: none; color: var(--text-2); font-size: 13px; text-decoration: underline; padding: 0; }
.field { width: 100%; padding: 12px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 16px; font-family: var(--sans); background: var(--bg); color: var(--text); }
.field:focus { outline: none; border-color: var(--text); }
.tab-row { display: flex; border-bottom: 0.5px solid var(--border-light); margin-bottom: 1rem; }
.tab { flex: 1; padding: 10px; background: transparent; border: none; border-bottom: 2px solid transparent; font-size: 13px; color: var(--text-2); font-family: var(--sans); }
.tab.active { color: var(--text); border-bottom-color: var(--brass); font-weight: 500; }
.food-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border-light); font-size: 14px; }
.food-item .protein { color: var(--text-2); font-variant-numeric: tabular-nums; }
.food-protein-btn { display: inline-flex; align-items: center; gap: 4px; background: transparent; border: none; padding: 6px 8px; margin: -6px -8px; border-radius: var(--radius); cursor: pointer; font-family: var(--sans); }
.food-protein-btn:active { background: var(--bg-alt); }
.food-pencil { font-size: 11px; color: var(--text-3); opacity: 0.6; }
.food-edit-input { width: 64px; padding: 6px 8px; font-size: 14px; text-align: right; }
.suggestion-box { background: var(--oxblood-bg); padding: 16px 18px; border-radius: var(--radius); margin-bottom: 16px; color: var(--oxblood-text); }
.suggestion-num { font-family: var(--serif); font-size: 34px; font-weight: 400; color: var(--oxblood-text); line-height: 1; margin: 4px 0; letter-spacing: -0.02em; }
.suggestion-why { font-size: 12px; color: var(--oxblood-text); opacity: 0.78; margin: 4px 0 0; }
.exercise-counter { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); font-weight: 500; margin: 0; }
.empty-state { text-align: center; padding: 2rem 1rem; color: var(--text-3); font-size: 14px; }
.surprise-overlay { padding: 1.75rem; background: var(--cobalt-bg); border-radius: var(--radius-lg); margin: 1rem 0; color: var(--cobalt-text); }
.surprise-text { font-family: var(--serif); font-size: 18px; line-height: 1.4; margin: 0; color: var(--cobalt-text); }
.history-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid var(--border-light); font-size: 14px; }
.history-detail { color: var(--text-2); font-size: 12px; font-variant-numeric: tabular-nums; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-light); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.exercise-name { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; margin: 8px 0 4px; }
.set-tracker { display: flex; gap: 6px; margin: 12px 0 16px; }
.set-pill { flex: 1; padding: 8px 4px; border: 0.5px solid var(--border-light); border-radius: var(--radius); text-align: center; font-size: 11px; color: var(--text-3); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.set-pill.done { background: var(--text); color: var(--bg); border-color: var(--text); }
.set-pill.active { border-color: var(--oxblood); color: var(--oxblood); border-width: 1px; }
.detail-toggle { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; cursor: pointer; border-top: 0.5px solid var(--border-light); font-size: 13px; color: var(--text-2); }
.detail-content { padding: 8px 0 16px; font-size: 14px; line-height: 1.55; }
.detail-content h4 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin: 12px 0 6px; font-weight: 500; }
.detail-content ul { padding-left: 18px; margin: 6px 0; }
.detail-content li { margin-bottom: 4px; }
.detail-content p { margin: 0 0 8px; }
.timer-display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.04em; line-height: 1; margin: 0; }
.rest-presets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 16px; }
.preset-btn { padding: 10px 4px; border: 0.5px solid var(--border); border-radius: var(--radius); background: transparent; font-size: 13px; color: var(--text); }
.preset-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.trivia-card { background: var(--cobalt-bg); padding: 1.25rem 1.4rem; border-radius: var(--radius-lg); margin: 1.5rem 0; min-height: 120px; color: var(--cobalt-text); }
.trivia-eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brass-bright); margin: 0 0 8px; font-weight: 500; }
.trivia-text { font-family: var(--serif); font-size: 17px; line-height: 1.45; margin: 0; color: var(--cobalt-text); }
.overview-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border-light); font-size: 14px; }
.overview-row-btn { display: flex; align-items: center; gap: 10px; padding: 12px 8px; margin: 0 -8px; border-bottom: 0.5px solid var(--border-light); font-size: 14px; width: calc(100% + 16px); background: transparent; border-top: none; border-left: none; border-right: none; border-radius: 4px; text-align: left; cursor: pointer; font-family: inherit; color: inherit; }
.overview-row-btn:active { background: rgba(0, 0, 0, 0.04); }
.overview-row-btn:last-child { border-bottom: none; }
.overview-mark { width: 18px; height: 18px; border-radius: 50%; border: 0.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.overview-mark.done { background: var(--text); border-color: var(--text); }
.overview-mark.done::after { content: ''; width: 7px; height: 7px; background: var(--bg); border-radius: 50%; }
.overview-mark.current::after { content: ''; width: 7px; height: 7px; background: var(--text); border-radius: 50%; }
.overview-mark.partial { border-color: var(--brass); background: var(--cream-warm, #f3ecdf); }
.overview-mark.partial::after { content: ''; width: 7px; height: 7px; background: var(--brass); border-radius: 50%; }
.overview-name { flex: 1; }
.overview-name.done { color: var(--text-3); text-decoration: line-through; }
.overview-name.current { font-weight: 500; }
.overview-meta { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.next-up-card { background: var(--bg-alt); padding: 12px 14px; border-radius: var(--radius); margin-top: 14px; font-size: 13px; }
.next-up-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin: 0 0 4px; font-weight: 500; }
.next-up-card p { margin: 0; }
.looks-like { background: #f3dfd9; border-left: 2px solid var(--oxblood); border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 14px; margin: 0 0 14px; font-family: var(--serif); font-size: 15px; line-height: 1.4; color: var(--text); }
.looks-like-label { font-family: var(--sans); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--oxblood); font-weight: 600; margin-right: 4px; }
.logo-mark { display: inline-block; cursor: pointer; user-select: none; -webkit-user-select: none; }
.bonus-card { background: var(--forest-bg); padding: 16px 18px; border-radius: var(--radius); cursor: pointer; color: var(--forest-text); transition: transform 0.15s ease; }
.bonus-card:active { transform: scale(0.99); }
.bonus-card .muted { color: var(--forest-text); opacity: 0.72; }
.bonus-active { display: flex; flex-direction: column; min-height: calc(100vh - 2rem); padding: 0; }
.bonus-active.paused { opacity: 0.85; }
.bonus-progress { height: 3px; background: var(--border-light); border-radius: 2px; overflow: hidden; margin-bottom: 1rem; }
.bonus-progress-fill { height: 100%; background: var(--forest); transition: width 1s linear; }
.bonus-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.bonus-visual { width: 100%; aspect-ratio: 5/3; background: var(--cream-warm, #f3ecdf); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: center; border: 0.5px solid var(--border-light); }
.bonus-visual img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; display: block; }
.bonus-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.bonus-placeholder-num { font-family: var(--serif); font-size: 56px; color: var(--brass); line-height: 1; letter-spacing: -0.02em; }
.bonus-placeholder-type { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); font-weight: 500; }
.bonus-ex-name { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 0.5rem; text-align: center; }
.bonus-timer { font-family: var(--serif); font-size: 84px; font-weight: 400; letter-spacing: -0.04em; line-height: 1; text-align: center; margin: 0.5rem 0 0.75rem; font-variant-numeric: tabular-nums; cursor: pointer; user-select: none; -webkit-user-select: none; }
.bonus-timer:active { transform: scale(0.97); }
.bonus-timer.paused { color: var(--text-3); }
.bonus-paused-label { font-size: 11px; color: var(--text-3); text-align: center; letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 1.5rem; font-weight: 500; }
.bonus-up-next { font-size: 12px; color: var(--text-3); text-align: center; letter-spacing: 0.04em; margin: 0 0 1.5rem; }
.bonus-controls { display: flex; flex-direction: column; gap: 0; margin-top: auto; }
.bonus-pause-btn { background: var(--bg-alt) !important; color: var(--text) !important; border: 0.5px solid var(--border) !important; }
.photo-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border-light); }
.photo-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: var(--radius); flex-shrink: 0; }
.photo-thumb-empty { width: 60px; height: 60px; background: var(--bg-alt); border-radius: var(--radius); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 18px; color: var(--text-3); }
.api-banner { background: var(--bg-info); padding: 10px 14px; border-radius: var(--radius); font-size: 12px; color: var(--text-info); margin-bottom: 1rem; }
.api-banner button { font-size: 12px; padding: 4px 8px; margin-left: 8px; background: var(--text); color: var(--bg); border: none; border-radius: 6px; }
.head-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 8px; }
.head-bar-buttons { display: flex; gap: 6px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ============ EXERCISE DETAILS ============
const EX_DET = {
  "Incline DB Press": {
    s: "Bench at 30-45° (lower angle = more chest, less shoulder). Feet planted. DBs at shoulder level, palms forward. Light arch in lower back, shoulder blades pulled down and back into the bench.",
    c: ["Press up and slightly inward — DBs almost touch at top, don't lock out fully.","Lower under control to deep stretch (DBs even with chest).","Drive elbows down and back at bottom — that's the chest stretch position."],
    m: ["Bench too steep (>45°) turns it into a shoulder press.","Bouncing weights off chest kills the eccentric.","Flaring elbows at 90° — bad shoulder position. Tuck to ~45°."],
    h: ["Brace butt and feet hard before each rep — full-body tension = more weight moved.","Last set: 1-2 rep drop set with lighter DBs.","If you cap out at 50s: pause reps at the bottom for 2 sec — same stimulus, less weight needed."]
  },
  "Machine Chest Press": {
    s: "Adjust seat so handles align with mid-chest. Sit tall, slight back arch, feet flat. Retract shoulder blades.",
    c: ["Press out and slightly up — squeeze chest at contracted position.","Don't lock out fully.","Slow eccentric (2-3 sec) — most growth happens in lengthening phase."],
    m: ["Letting elbows shoot forward instead of pressing through chest.","Shortening range to use more weight.","Shoulders rounding forward at the start kills chest activation."],
    h: ["After last working set: drop pin 2-3 plates, 10-15 more reps.","Try 1.5-rep variation: full press, half-rep down, full press = 1 rep. Brutal."]
  },
  "Cable Lateral Raise": {
    s: "Cable at lowest setting. Stand with working side away from machine, cable crossing in front of body. Slight forward lean. Free hand on machine for stability.",
    c: ["Lead with elbow, not hand — pinky slightly higher at top.","Raise to just above shoulder height. Higher = traps take over.","Slow eccentric (3 sec down). The stretch is where side delts grow."],
    m: ["Using front delt by raising in front of body. Cable should travel in frontal plane.","Shrugging traps — keep shoulders pulled down.","Going too heavy. Lateral raises are 80% form, 20% weight."],
    h: ["Cables > dumbbells for laterals. Constant tension = more total work.","Lean torso slightly toward cable stack — increases stretch at bottom.","Last set: pause at top for 1 sec each rep."]
  },
  "Seated DB Overhead Press": {
    s: "Bench upright (90° or slightly less), back firmly against pad. DBs at shoulder level, palms forward, elbows ~45° in front of body.",
    c: ["Press up, DBs come together at top but don't clank.","Don't lock elbows.","Lower to ear level — full stretch on front delt."],
    m: ["Arching lower back excessively (turns into incline press).","Flaring elbows straight to sides — impingement risk.","Looking up — keep neck neutral."],
    h: ["If shoulders feel cranky: try neutral grip (palms facing each other). Same growth, friendlier on joints.","Press one arm at a time on last set — core bonus, less per-arm fatigue."]
  },
  "Cable Tricep Pushdown": {
    s: "High pulley with rope or straight bar. Stand close to machine. Elbows pinned to ribs, slight forward lean.",
    c: ["Only forearms move. Elbows stay locked at sides.","Squeeze triceps hard at full extension for 1 sec.","Slow eccentric back up."],
    m: ["Elbows drifting forward — turns it into a chest exercise.","Using bodyweight to push down — that's not tricep work.","Going too heavy and using shoulders to slam bar down."],
    h: ["Rope > bar for most people — flare rope at bottom for peak contraction.","Pyramid down: heavy 8 reps → drop weight → 12 → drop → 15-20. One brutal set replaces three."]
  },
  "Cable Crunch": {
    s: "Kneel facing cable stack. Rope at top pulley. Hold rope at sides of head, hips back slightly. Round upper back.",
    c: ["Crunch from the abs — pull sternum to hips, not weight with arms.","Hold contracted position 1 sec.","Resist on the way back up."],
    m: ["Using arms/lats to pull weight — most common error and why people don't feel abs.","Hip flexor takeover — keep hips slightly back, don't fold at waist.","Going too heavy. Abs respond to time under tension."],
    h: ["Anchor elbows to forehead position; don't let them move. Then it's purely abs.","Try sitting on bench facing away from cable — different angle, same gains."]
  },
  "Lat Pulldown": {
    s: "Neutral grip handle (palms facing each other, shoulder-width). Knees secured. Lean back ~15-20°. Chest up, shoulder blades pulled down.",
    c: ["Pull elbows down and back — 'put your elbows in your back pockets.'","Bar/handle to upper chest, not chin.","Full stretch at top — let shoulder blades rise. Stretch is where lats grow."],
    m: ["Using biceps as prime mover (curling bar down). Lats first.","Not letting shoulder blades elevate at top.","Leaning back too far — turns it into a row."],
    h: ["Pre-stretch: at top, pause 1 sec in full stretch before pulling. Game-changer.","Neutral grip beats wide pronated for most people — less elbow strain, often better lat activation."]
  },
  "Chest-Supported Row": {
    s: "Chest pad set to mid-chest. Feet on platform, slight knee bend. Grip handles, neutral shoulder blades.",
    c: ["Pull elbows back and slightly down. Squeeze shoulder blades hard at top.","Pause 1 sec at top — squeeze is where mid-back grows.","Slow eccentric to full stretch."],
    m: ["Heaving with body english. Don't let torso lift off pad.","Pulling with biceps (rounding shoulders) — back first.","Cutting eccentric range short."],
    h: ["Try underhand grip occasionally — hits lower lats differently.","Imagine you're crushing a pencil between your shoulder blades at top of every rep."]
  },
  "Rear Delt Fly": {
    s: "Rear delt machine: chest against pad, arms extended forward. OR cable: cables crossed at chest height, opposite-side handles, arms extended forward.",
    c: ["Pull arms out and slightly back, leading with elbows/pinkies.","Squeeze rear delts at end range — between/above shoulder blades.","Slow controlled return — no momentum."],
    m: ["Using middle traps instead of rear delts. Think 'fly,' not 'row.'","Going heavy and using momentum.","Arms too straight — slight elbow bend isolates rear delts."],
    h: ["Rear delts respond well to high reps (15-20) and frequency.","Most underrated muscle for upper body aesthetics — wider, more 3D shoulders. Don't skip."]
  },
  "Incline DB Curl": {
    s: "Bench at 45-60° incline. Sit back fully, arms hanging straight down (not in front of body). DBs in supinated grip.",
    c: ["Curl without letting elbows drift forward — they stay pinned.","Full stretch at bottom — this position is what makes it special.","Squeeze biceps at top, slow eccentric."],
    m: ["Swinging with shoulder rotation.","Not getting full extension at bottom — long head stretch is the entire point.","Arching off bench."],
    h: ["Slight outward wrist rotation at top of each rep — extra peak contraction.","Last set: hold contracted position 5 sec on final rep. Insane pump."]
  },
  "Cable Hammer Curl": {
    s: "Low pulley with rope attachment. Stand upright, rope at sides of body, neutral grip.",
    c: ["Curl rope up keeping wrist neutral — no rotation.","Squeeze at top, controlled descent.","Elbows pinned to sides, no swinging."],
    m: ["Letting elbows flare forward as you curl up.","Using too much weight, recruiting shoulders.","Cutting reps short at bottom."],
    h: ["Hammer curls grow the brachialis — the muscle UNDER the bicep that pushes it up and makes arms look thicker.","Last set: 7 bottom-half reps, 7 top-half reps, 7 full reps."]
  },
  "Hanging Leg Raise": {
    s: "Hang from pull-up bar with straight arms (or use ab straps). Neutral hips at start.",
    c: ["Raise legs by curling pelvis up — knees come toward chest first, then extend if you can.","Don't just swing legs from hip — that's hip flexor. Curl the lower spine.","Slow controlled descent."],
    m: ["Pure hip flexion (legs raise but pelvis doesn't curl) = hip flexors, not abs.","Using momentum from a swing.","Going too heavy on knee-raise version when you could do controlled bent-knee raises."],
    h: ["Start with bent-knee raises if straight-leg is too hard.","If grip is the limiter: ab straps from the bar solve it instantly.","Pause at top for 1 sec — eliminates momentum cheating, doubles the difficulty."]
  },
  "Leg Press": {
    s: "Sit fully in machine, lower back pressed into pad. Feet shoulder-width, HIGH on platform (more glute, less quad). Knees track over toes.",
    c: ["Lower platform until knees reach 90° or slightly past — full range matters.","Drive through heels, not toes.","Don't lock knees at top — keep tension."],
    m: ["Half-rep cheating (only going down 6 inches). Useless.","Lower back rounding off pad at deep range — back off the depth.","Feet too low (becomes quad-only)."],
    h: ["Foot position is everything. High and wide = glutes/hams. Low and narrow = quads.","Single-leg leg press at the end — closes side imbalance, smokes glutes."]
  },
  "Romanian Deadlift": {
    s: "Stand with DBs or barbell in front of thighs. Soft knee bend (don't lock, don't squat). Hips back, chest up, neutral spine.",
    c: ["Push hips back as weight lowers — bar/DBs travel straight down the shins.","Lower until you feel deep hamstring stretch (usually mid-shin).","Drive hips forward to come up — squeeze glutes hard at top."],
    m: ["Squatting it (knees bend too much) — that's a deadlift, not an RDL.","Rounding lower back at bottom — drop the weight before this happens.","Hyperextending at top — neutral hip position, don't lean back."],
    h: ["Single best hamstring/glute builder. Don't substitute it.","Slow eccentric (3 sec down) — you'll feel hamstrings tomorrow.","Hold 1-sec stretch at the bottom on last set."]
  },
  "Bulgarian Split Squat": {
    s: "Rear foot elevated on bench. Front foot far enough forward that knee tracks over ankle at bottom. DBs at sides.",
    c: ["Lower straight down — rear leg is for balance only.","Most weight in front foot's heel and mid-foot.","Drive up through front heel."],
    m: ["Front foot too close — knee shoots way past toes.","Bouncing at bottom.","Putting too much weight on back foot."],
    h: ["Slight forward lean = more glute. Upright torso = more quad.","Humbling. Start light. Even 15-lb DBs is plenty in week 1.","All reps on one leg before switching — no alternating."]
  },
  "Leg Curl Machine": {
    s: "Lying or seated leg curl. Pad just above heels (Achilles area). Hips pressed into pad/seat.",
    c: ["Curl heels toward glutes through full range.","Squeeze hams hard at contracted position.","Slow eccentric — 2-3 sec back."],
    m: ["Hips lifting off pad to use lower back — cheating.","Cutting range short.","Going so heavy you can't control eccentric."],
    h: ["Point toes (plantarflex) during curls — slight emphasis shift.","Single-leg curls expose imbalances and grow weak side faster."]
  },
  "Standing Calf Raise": {
    s: "Calves on platform, balls of feet on edge, heels hanging. Knees straight (or very slight bend).",

const STORAGE_PREFIX = 'recomp:';
function load(key, fallback) {
  try {
    const v = localStorage.getItem(STORAGE_PREFIX + key);
    return v === null ? fallback : JSON.parse(v);
  } catch(e) { return fallback; }
}
function save(key, value) {
  try { localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value)); } catch(e) {}
}
function loadAll() {
  state.programState = load('program-state', null);
  state.liftHistory = load('lift-history', []);
  state.foodLog = load('food-log', []);
  state.bodyweight = load('bodyweight', 190);
  state.eggs = load('eggs', { week3: false, longPress: false });
  state.apiKey = load('api-key', null);
  state.bonusPhotos = load('bonus-photos', {});
  state.bonusCompletions = load('bonus-completions', []);
  state.audioEnabled = load('audio-enabled', true);
  // Restore in-progress workout if one exists
  const saved = load('workout-session', null);
  if (saved && saved.workoutSession) {
    state.workoutSession = saved.workoutSession;
    state.exerciseIndex = saved.exerciseIndex || 0;
    state.setIndex = saved.setIndex || 0;
    state.currentSetInput = saved.currentSetInput || { weight: '', reps: '', rir: '' };
    state.view = 'workout'; // resume into workout view
  }
}

// Persist the in-progress workout to localStorage. Call after any state mutation
// that affects sets, exercise position, etc.
function persistWorkout() {
  if (state.workoutSession) {
    save('workout-session', {
      workoutSession: state.workoutSession,
      exerciseIndex: state.exerciseIndex,
      setIndex: state.setIndex,
      currentSetInput: state.currentSetInput
    });
  } else {
    // Workout ended/quit — clear it
    try { localStorage.removeItem(STORAGE_PREFIX + 'workout-session'); } catch(e) {}
  }
}

// Lookup with fallback: user-uploaded > bundled. Used by workout view and settings.
function getBonusPhoto(exId) {
  const userPhoto = state.bonusPhotos[exId];
  if (userPhoto) return userPhoto;
  if (typeof BUNDLED_BONUS_PHOTOS !== 'undefined') {
    return BUNDLED_BONUS_PHOTOS[String(exId)] || null;
  }
  return null;
}

// ============ PROGRAM LOGIC ============
function getCurrentDay() {
  if (!state.programState) return null;
  const start = new Date(state.programState.startDate);
  const today = new Date();
  start.setHours(0,0,0,0); today.setHours(0,0,0,0);
  const diffDays = Math.floor((today - start) / 86400000);
  if (diffDays < 0) return { week: 0, status: 'pre-start' };
  const week = Math.floor(diffDays / 7) + 1;
  if (week > 6) return { week: 7, status: 'complete' };
  return { week, status: 'active' };
}

function getMostRecentMonday() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const dow = today.getDay(); // 0 = Sunday, 1 = Monday, ... 6 = Saturday
  const offset = dow === 0 ? 6 : dow - 1; // days since most recent Monday
  const monday = new Date(today.getTime() - offset * 86400000);
  return monday.toISOString().split('T')[0];
}
// Returns set of day numbers (1-4) completed during this week (Mon-Sun).
function getThisWeekCompletions() {
  const monday = getMostRecentMonday();
  const completed = new Set();
  state.liftHistory.forEach(function(h) {
    if (h.date >= monday && h.day) completed.add(h.day);
  });
  return completed;
}
// Returns the next unfinished workout day number (1-4), or null if all done.
function getNextWorkout() {
  const completed = getThisWeekCompletions();
  for (let d = 1; d <= 4; d++) {
    if (!completed.has(d)) return d;
  }
  return null; // all 4 done
}
function getLastSession(name) {
  const s = state.liftHistory.filter(x => x.exercise === name);
  return s.length === 0 ? null : s[s.length - 1];
}
function getSuggestion(ex, week) {
  const last = getLastSession(ex.name);
  if (week === 1 || !last) return { type: 'calibrate', weight: null, repTarget: ex.repMin + '-' + ex.repMax, why: 'Calibration: pick a weight that feels like RIR 3 — three reps left in the tank.' };
  if (week === 6) return { type: 'deload', weight: last.weight, repTarget: ex.repMin + '-' + ex.repMax, why: 'Deload week: same weight, drop one set, RIR 2.' };
  const allTop = last.sets && last.sets.every(s => s.reps >= ex.repMax && s.rir <= 2);
  if (allTop && ex.increment > 0) return { type: 'progress', weight: last.weight + ex.increment, repTarget: ex.repMin + '-' + ex.repMax, why: '+' + ex.increment + ' from last session — you hit ' + ex.repMax + 's clean.' };
  return { type: 'maintain', weight: last.weight, repTarget: ex.repMin + '-' + ex.repMax, why: 'Same weight. Push for one more rep than last time.' };
}

// ============ DOM ============
function el(tag, props, children) {
  props = props || {}; children = children == null ? [] : children;
  const e = document.createElement(tag);
  for (const k in props) {
    const v = props[k];
    if (k === 'style') e.setAttribute('style', v);
    else if (k === 'onclick') e.onclick = v;
    else if (k === 'oninput') e.oninput = v;
    else if (k === 'onchange') e.onchange = v;
    else if (k === 'class') e.className = v;
    else if (k === 'href') e.setAttribute('href', v);
    else if (k === 'target') e.setAttribute('target', v);
    else if (k === 'rel') e.setAttribute('rel', v);
    else if (k === 'value') e.value = v;
    else if (k === 'placeholder') e.placeholder = v;
    else if (k === 'type') e.setAttribute('type', v);
    else if (k === 'id') e.id = v;
    else e.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}

// ============ WORKOUT ============
function startWorkout(dayNum, week) {
  state.workoutSession = { dayNum: dayNum, week: week, startedAt: Date.now(), setsByExercise: {} };
  state.exerciseIndex = 0; state.setIndex = 0;
  state.expandedDetail = null; state.showOverview = false;

  state.view = 'workout';
  persistWorkout();
  render();
}
// Helper: get the sets array for a given exercise (creates it if missing)
function getSetsForExercise(exIdx) {
  if (!state.workoutSession.setsByExercise[exIdx]) {
    state.workoutSession.setsByExercise[exIdx] = [];
  }
  return state.workoutSession.setsByExercise[exIdx];
}
// Helper: is this exercise complete (all required sets logged)?
function isExerciseComplete(exIdx) {
  const day = PROGRAM[state.workoutSession.dayNum];
  const ex = day.exercises[exIdx];
  const sets = state.workoutSession.setsByExercise[exIdx] || [];
  return sets.length >= ex.sets;
}
// Jump to a specific exercise. Position the active set at the next-incomplete one,
// or at the last set if exercise is already complete (so user can review/overwrite).
function jumpToExercise(exIdx) {
  state.exerciseIndex = exIdx;
  const sets = getSetsForExercise(exIdx);
  const day = PROGRAM[state.workoutSession.dayNum];
  const ex = day.exercises[exIdx];
  // Set the active set to the next unlogged one, or the last one if all logged
  state.setIndex = Math.min(sets.length, ex.sets - 1);
  // Pre-fill input with the suggested weight (or, if mid-exercise, last logged weight)
  if (sets.length > 0) {
    state.currentSetInput = { weight: sets[sets.length - 1].weight, reps: '', rir: '' };
  } else {
    const sug = getSuggestion(ex, state.workoutSession.week);
    state.currentSetInput = { weight: sug.weight !== null ? sug.weight : '', reps: '', rir: '' };
  }
  state.expandedDetail = null;
  state.showOverview = false;
  state.view = 'workout';
  persistWorkout();
  render();
}

// Find the next exercise that isn't complete, starting after current. Returns null if none.
function findNextIncompleteExercise() {
  const day = PROGRAM[state.workoutSession.dayNum];
  for (let i = state.exerciseIndex + 1; i < day.exercises.length; i++) {
    if (!isExerciseComplete(i)) return i;
  }
  // None found after current — check before (in case user hopped ahead)
  for (let i = 0; i < state.exerciseIndex; i++) {
    if (!isExerciseComplete(i)) return i;
  }
  return null;
}

function logSetAndAdvance() {
  const w = parseFloat(state.currentSetInput.weight);
  const r = parseInt(state.currentSetInput.reps);
  const rir = parseInt(state.currentSetInput.rir);
  if (isNaN(w) || isNaN(r)) { if (!confirm('Set has incomplete data. Skip it?')) return; skipSet(); return; }
  // Write to setsByExercise — overwrite if this set position was already logged
  const sets = getSetsForExercise(state.exerciseIndex);
  sets[state.setIndex] = { weight: w, reps: r, rir: isNaN(rir) ? 0 : rir };
  const day = PROGRAM[state.workoutSession.dayNum];
  const ex = day.exercises[state.exerciseIndex];
  // Advance: next set, or next incomplete exercise, or finish
  if (state.setIndex < ex.sets - 1) {
    state.setIndex++;
    state.currentSetInput = { weight: w, reps: '', rir: '' };
    persistWorkout();
    triggerRest();
  } else {
    // This exercise is now fully logged. Find next incomplete or finish.
    const nextIdx = findNextIncompleteExercise();
    if (nextIdx === null) {
      persistWorkout();
      finishWorkout();
      return;
    }
    advanceToExercise(nextIdx);
    persistWorkout();
    triggerRest();
  }
}
function skipSet() {

    state.setIndex++;
    state.currentSetInput = { weight: state.currentSetInput.weight, reps: '', rir: '' };
    persistWorkout();
    render();
  } else {
    // At last set position — find next incomplete exercise (note: this exercise isn't
    // complete since we skipped, but findNext skips it because we look from idx+1)
    const nextIdx = findNextIncompleteExercise();
    if (nextIdx === null) {
      // No other incomplete exercises — but this one isn't complete either.
      // User can either log remaining sets here, or end the workout. Show overview.
      state.showOverview = true;
      persistWorkout();
      render();
      return;

    advanceToExercise(nextIdx);
    persistWorkout();
    render();
  }
}
function advanceToExercise(idx) {

  const sets = getSetsForExercise(idx);
  const day = PROGRAM[state.workoutSession.dayNum];
  const ex = day.exercises[idx];
  state.setIndex = Math.min(sets.length, ex.sets - 1);
  state.expandedDetail = null;
  if (sets.length > 0) {
    state.currentSetInput = { weight: sets[sets.length - 1].weight, reps: '', rir: '' };

function triggerRest() {

// Save workout to history and clear session. Pushes one history entry per exercise that

function commitWorkoutToHistory() {

      const sets = state.workoutSession.setsByExercise[idxStr];

async function loadTrivia() {

async function logFood() {

    });

// ============ AUDIO (Web Audio API, non-interrupting) ============
function ensureAudioCtx() {
  if (!state.audioEnabled) return null;
  if (!state.audioCtx) {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) state.audioCtx = new Ctx();
    } catch(e) { return null; }
  }
  // Resume if suspended (iOS requires user gesture)
  if (state.audioCtx && state.audioCtx.state === 'suspended') {
    try { state.audioCtx.resume(); } catch(e) {}
  }
  return state.audioCtx;
}
function playBeep(freq, durationMs, volume) {
  const ctx = ensureAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(volume || 0.15, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationMs / 1000);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + durationMs / 1000);
}
function playStartCue() {
  // 3 quick beeps ascending
  playBeep(660, 120, 0.18);
  setTimeout(() => playBeep(660, 120, 0.18), 180);
  setTimeout(() => playBeep(880, 180, 0.22), 360);
}
function playWarningBeep() {
  // 1 beep at 15s warning — softer mid-tone
  playBeep(520, 200, 0.18);
}
function playSwitchSidesCue() {
  // Two distinct higher beeps
  playBeep(880, 180, 0.22);
  setTimeout(() => playBeep(1040, 200, 0.22), 220);
}
function playFinishCue() {
  // Triumphant little flourish
  playBeep(660, 150, 0.22);
  setTimeout(() => playBeep(880, 150, 0.22), 160);
  setTimeout(() => playBeep(1100, 350, 0.25), 320);
}

// ============ BONUS WORKOUT LOGIC ============
function getBonusForToday() {
  const today = new Date().toISOString().split('T')[0];
  return state.bonusCompletions.filter(b => b.date === today);
}
function startBonus(workout) {
  // Prime audio context with this user gesture
  ensureAudioCtx();
  state.bonusSession = {
    workoutId: workout.id,
    startedAt: Date.now(),
    exerciseStartedAt: Date.now(),
    currentIndex: 0,
    timeRemaining: workout.exercises[0].seconds,
    isPaused: false,
    pausedAt: null,
    pausedDuration: 0, // total time spent paused on current exercise
    intervalId: null,
    warningPlayed: false
  };
  state.view = 'bonus-active';
  render();
  // Start cue + first beep
  playStartCue();
  startBonusTick();
  // Listen for visibility changes to handle backgrounding
  document.addEventListener('visibilitychange', handleVisibilityChange);
}
function handleVisibilityChange() {
  if (!state.bonusSession || state.bonusSession.isPaused) return;
  if (!document.hidden) {
    // Just came back from background — force immediate sync
    bonusTick();
  }
}
function startBonusTick() {
  if (state.bonusSession.intervalId) clearInterval(state.bonusSession.intervalId);
  // Tick every 250ms for smooth display, but use absolute time for correctness
  state.bonusSession.intervalId = setInterval(bonusTick, 250);
}
function bonusTick() {
  const s = state.bonusSession;
  if (!s || s.isPaused) return;
  const workout = HOLLYWOOD_AB_BLAST;

  // Calculate elapsed time on current exercise from absolute timestamps
  const currentEx = workout.exercises[s.currentIndex];
  const now = Date.now();
  const elapsedMs = now - s.exerciseStartedAt - s.pausedDuration;
  const elapsedSec = Math.floor(elapsedMs / 1000);
  const newTimeRemaining = Math.max(0, currentEx.seconds - elapsedSec);

  // Detect transitions: only do work when timeRemaining actually changes
  const tickedDown = newTimeRemaining !== s.timeRemaining;
  s.timeRemaining = newTimeRemaining;

  // Update DOM directly to avoid full re-renders every tick
  if (tickedDown) {
    const tEl = document.getElementById('bonus-timer');
    if (tEl) tEl.textContent = formatTime(s.timeRemaining);
    const pEl = document.getElementById('bonus-progress-fill');
    if (pEl) {
      const totalElapsed = workout.exercises.slice(0, s.currentIndex).reduce((a, b) => a + b.seconds, 0) + (currentEx.seconds - s.timeRemaining);
      const pct = (totalElapsed / workout.durationSeconds) * 100;
      pEl.style.width = Math.min(100, pct) + '%';
    }
  }

  // 15-second warning beep — only for exercises 30s+
  if (tickedDown && s.timeRemaining === 15 && currentEx.seconds >= 30 && !s.warningPlayed) {
    playWarningBeep();
    s.warningPlayed = true;
  }

  // Handle exercise transition (potentially multiple if returning from a long background)
  if (s.timeRemaining <= 0) {
    let advanced = false;
    let crossedSideSwitch = false;
    while (s.timeRemaining <= 0 && s.currentIndex < workout.exercises.length) {
      const overshootMs = elapsedMs - currentEx.seconds * 1000;
      const prevEx = workout.exercises[s.currentIndex];
      s.currentIndex += 1;
      s.warningPlayed = false;
      advanced = true;
      if (s.currentIndex >= workout.exercises.length) {
        finishBonus();
        return;
      }
      const nextEx = workout.exercises[s.currentIndex];
      // New exercise's absolute start = this exercise's deadline = now - overshoot
      // But to keep things robust on long catchups, just walk forward:
      s.exerciseStartedAt = s.exerciseStartedAt + (workout.exercises[s.currentIndex - 1].seconds * 1000);
      s.pausedDuration = 0;
      // Recalculate remaining for the new exercise
      const newElapsed = Date.now() - s.exerciseStartedAt;
      s.timeRemaining = Math.max(0, nextEx.seconds - Math.floor(newElapsed / 1000));
      // Track if we crossed a side-switch boundary
      if (prevEx.block === 'side' && nextEx.block === 'side' && prevEx.side !== nextEx.side) {
        crossedSideSwitch = true;
      }
    }
    if (advanced) {
      if (crossedSideSwitch) playSwitchSidesCue();
      else playStartCue();
      render();
    }
  }
}
function pauseBonus() {
  if (!state.bonusSession || state.bonusSession.isPaused) return;
  state.bonusSession.isPaused = true;
  state.bonusSession.pausedAt = Date.now();
  render();
}
function resumeBonus() {
  if (!state.bonusSession || !state.bonusSession.isPaused) return;
  // Add the time we were paused to pausedDuration so it doesn't count against the timer
  state.bonusSession.pausedDuration += Date.now() - state.bonusSession.pausedAt;
  state.bonusSession.isPaused = false;
  state.bonusSession.pausedAt = null;
  render();
}
function skipBonusExercise() {
  if (!state.bonusSession) return;
  // Force the current exercise to be "over" by backdating the start time
  const ex = HOLLYWOOD_AB_BLAST.exercises[state.bonusSession.currentIndex];
  state.bonusSession.exerciseStartedAt = Date.now() - (ex.seconds * 1000) - 1;
  state.bonusSession.pausedDuration = 0;
  bonusTick();
}
function endBonus(completed) {
  if (state.bonusSession && state.bonusSession.intervalId) clearInterval(state.bonusSession.intervalId);
  document.removeEventListener('visibilitychange', handleVisibilityChange);
  if (completed) {
    state.bonusCompletions.push({
      date: new Date().toISOString().split('T')[0],
      workoutId: HOLLYWOOD_AB_BLAST.id,
      workoutName: HOLLYWOOD_AB_BLAST.name,
      completedAt: Date.now(),
      exercisesCompleted: HOLLYWOOD_AB_BLAST.exercises.length,
      partial: false
    });
    save('bonus-completions', state.bonusCompletions);
  }
  state.bonusSession = null;
  state.view = completed ? 'bonus-complete' : 'home';
  render();
}
function finishBonus() {
  playFinishCue();
  endBonus(true);
}
function abandonBonus() {
  if (!confirm('End the workout? Progress will not be logged as a completed session.')) return;
  if (state.bonusSession) {
    const partial = state.bonusSession.currentIndex;
    if (partial > 0) {
      state.bonusCompletions.push({
        date: new Date().toISOString().split('T')[0],
        workoutId: HOLLYWOOD_AB_BLAST.id,
        workoutName: HOLLYWOOD_AB_BLAST.name,
        completedAt: Date.now(),
        exercisesCompleted: partial,
        partial: true
      });
      save('bonus-completions', state.bonusCompletions);
    }
  }
  endBonus(false);
}

function renderBonusPhotosSettings() {
  const c = el('div');
  const head = el('div', { class: 'head-bar' });
  head.appendChild(el('p', { class: 'eyebrow' }, 'Bonus workout photos'));
  head.appendChild(el('button', { class: 'btn-tiny', onclick: function() { state.view = 'settings'; render(); } }, '← Settings'));
  c.appendChild(head);
  c.appendChild(el('p', { class: 'muted', style: 'margin-bottom: 1.5rem; font-size: 13px; line-height: 1.5;' }, "Reference photos are bundled with the app and shown automatically. Upload your own to replace any photo. Stored on this device only."));
  const w = HOLLYWOOD_AB_BLAST;
  // For side-block, only show one entry per unique exercise (left and right share)
  const seen = {};
  w.exercises.forEach(ex => {
    const key = ex.id;
    if (seen[ex.name + (ex.block || '')]) return;
    seen[ex.name + (ex.block || '')] = true;
    const row = el('div', { class: 'photo-row' });
    const userPhoto = state.bonusPhotos[key];
    const displayPhoto = userPhoto || (typeof BUNDLED_BONUS_PHOTOS !== 'undefined' ? BUNDLED_BONUS_PHOTOS[String(key)] : null);
    if (displayPhoto) {
      const img = document.createElement('img');
      img.src = displayPhoto;
      img.className = 'photo-thumb';
      row.appendChild(img);
    } else {
      const ph = el('div', { class: 'photo-thumb-empty' }, String(ex.id).padStart(2, '0'));
      row.appendChild(ph);
    }
    const info = el('div', { style: 'flex: 1; padding: 0 12px;' });
    info.appendChild(el('p', { style: 'font-size: 14px; font-weight: 500; margin: 0;' }, ex.name));
    const subParts = [ex.seconds + 's', ex.type];
    if (ex.block === 'side') subParts.push('both sides share photo');
    if (!userPhoto && displayPhoto) subParts.push('bundled');
    info.appendChild(el('p', { class: 'muted', style: 'font-size: 11px; margin: 2px 0 0;' }, subParts.join(' · ')));
    row.appendChild(info);
    const upload = el('label', { class: 'btn-tiny', style: 'cursor: pointer;' }, userPhoto ? 'Replace' : 'Upload');
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    fileInput.onchange = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        // Resize to max 800px wide to keep storage manageable
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const maxW = 800;
          const scale = Math.min(1, maxW / img.width);
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
          state.bonusPhotos[key] = dataUrl;
          // Mirror to both sides if it's a side-block exercise
          if (ex.block === 'side') {
            const counterpart = w.exercises.find(x => x.name === ex.name && x.side !== ex.side);
            if (counterpart) state.bonusPhotos[counterpart.id] = dataUrl;
          }
          save('bonus-photos', state.bonusPhotos);
          render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };
    upload.appendChild(fileInput);
    row.appendChild(upload);
    if (userPhoto) {
      row.appendChild(el('button', { class: 'btn-tiny', style: 'margin-left: 6px; color: #b54d4d;', onclick: function() {
        if (!confirm('Remove this photo? The bundled version will show instead if available.')) return;
        delete state.bonusPhotos[key];
        if (ex.block === 'side') {
          const counterpart = w.exercises.find(x => x.name === ex.name && x.side !== ex.side);
          if (counterpart) delete state.bonusPhotos[counterpart.id];
        }
        save('bonus-photos', state.bonusPhotos);
        render();
      } }, 'Remove'));
    }
    c.appendChild(row);
  });
  return c;
}

loadAll();
render();
